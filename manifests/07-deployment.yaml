apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: openclaw
  labels:
    app: openclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      initContainers:
        - name: copy-config
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          command:
            - sh
            - -c
            - |
              cp /config/openclaw.json /.openclaw/openclaw.json
              cp /config/AGENTS.md /.openclaw/AGENTS.md
          volumeMounts:
            - name: openclaw-data
              mountPath: /.openclaw
            - name: openclaw-config
              mountPath: /config
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:latest
          ports:
            - containerPort: 18789
              name: gateway
          envFrom:
            - secretRef:
                name: openclaw-secrets
          volumeMounts:
            - name: openclaw-data
              mountPath: /.openclaw
          livenessProbe:
            httpGet:
              path: /healthz
              port: gateway
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: gateway
            initialDelaySeconds: 30
            periodSeconds: 5
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2"
      volumes:
        - name: openclaw-data
          persistentVolumeClaim:
            claimName: openclaw-data
        - name: openclaw-config
          configMap:
            name: openclaw-config
